  <rect x="15" y="45" width="4" height="13" rx="1" fill="#098751" opacity="0.8"/>
  <rect x="22" y="50" width="4" height="8" rx="1" fill="#098751" opacity="0.6"/>
  <rect x="29" y="44" width="4" height="14" rx="1" fill="#098751"/>
  <rect x="36" y="47" width="4" height="11" rx="1" fill="#098751" opacity="0.9"/>
